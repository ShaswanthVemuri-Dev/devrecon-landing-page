<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DevReCon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="DevReCon combines development, research, and consultation to build clear technical systems, AI workflows, products, and long-term engineering direction." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (function () {
        var redirect = sessionStorage.getItem('devrecon.redirect');
        if (!redirect) return;

        sessionStorage.removeItem('devrecon.redirect');
        var target = redirect.replace(/^\/?/, '/');
        window.history.replaceState(null, '', target);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
